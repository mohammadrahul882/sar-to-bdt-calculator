<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - Rahul Finance</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="header">
<h2>⚙ Settings</h2>
</header>

<div class="container">

<label>Default Currency</label>
<select id="currency">
<option>SAR</option>
<option>USD</option>
<option>AED</option>
<option>BDT</option>
</select>

<label>Default Exchange Rate</label>
<input type="number" id="rate" placeholder="Enter rate">

<button onclick="saveSettings()">Save Settings</button>

</div>

<script>

function saveSettings(){

const currency = document.getElementById("currency").value;
const rate = document.getElementById("rate").value;

localStorage.setItem("defaultCurrency",currency);
localStorage.setItem("defaultRate",rate);

alert("Settings Saved");

}

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rahul Finance Settings</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

.navbar{
background:#16a34a;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.container{
max-width:500px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
padding:12px;
border:none;
background:#16a34a;
color:white;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#15803d;
}

.dark{
background:#111;
color:white;
}

</style>
</head>

<body>

<div class="navbar">
⚙ Rahul Finance Settings
</div>

<div class="container">

<h3>Theme Settings</h3>

<button onclick="darkMode()">Dark Mode</button>
<button onclick="lightMode()">Light Mode</button>

<h3>Default Currency</h3>

<select id="currency">
<option>SAR</option>
<option>USD</option>
<option>AED</option>
<option>BDT</option>
</select>

<label>Default Exchange Rate</label>

<input type="number" id="rate" placeholder="Enter default rate">

<button onclick="saveSettings()">Save Settings</button>

<button onclick="resetSettings()">Reset Settings</button>

<a href="dashboard.html">
<button>Back to Dashboard</button>
</a>

</div>

<script>

function darkMode(){
document.body.classList.add("dark")
localStorage.setItem("theme","dark")
}

function lightMode(){
document.body.classList.remove("dark")
localStorage.setItem("theme","light")
}

function saveSettings(){

let currency=document.getElementById("currency").value
let rate=document.getElementById("rate").value

localStorage.setItem("currency",currency)
localStorage.setItem("rate",rate)

alert("Settings Saved Successfully")

}

function resetSettings(){

localStorage.clear()
alert("Settings Reset")

}

if(localStorage.getItem("theme")=="dark"){
document.body.classList.add("dark")
}

</script>

</body>
</html>
