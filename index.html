<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Finance Pro</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>    
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f9d58">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 

</head>

<body>
<header class="topbar">

<div class="logo">
<img src="images/logo.png" alt="logo">
<span>Rahul Finance</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="pages/tools.html">Tools</a>
<a href="pages/about.html">About</a>
<a href="pages/contact.html">Contact</a>
</nav>

</header>
<header>
<h2>Rahul Finance Dashboard 💰</h2>
<p>Ultimate Salary & Savings Planner</p>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</header>
<p>Live Exchange Rate: <span id="rate">--</span></p>
<div class="container">

<label>Select Currency</label>
<select id="currency" onchange="setRate()">
<option value="30">SAR</option>
<option value="29">AED</option>    
<option value="27">QAR</option>
<option value="85">KWD</option>
</select>

<label>Salary Amount</label>
<input type="number" id="salary" min="0">

<label>Exchange Rate</label>
    
<input type="number" id="exchangeRate" value="30">

<label>Monthly Expense (BDT)</label>
<input type="number" id="expense" min="0">

<label>Savings Goal (BDT)</label>
<input type="number" id="goal" min="0">

<label>Remittance Fee (%)</label>
<input type="number" id="fee" value="0" min="0" max="100">

<button onclick="calculate()">Calculate</button>
<button onclick="resetAll()">Reset</button>
<button onclick="shareResult()">Share</button>
<button id="installBtn" style="display:none;">Install App</button>  
<div class="result" id="output"></div>
<canvas id="financeChart"></canvas>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div class="history" id="history"></div>

</div>

<footer>
© 2026 Rahul Finance Tool 🚀
</footer>

<script>
let financeChart;
function setRate(){
rate.value = currency.value;
}

function calculate(){

let salary = Number(salaryInput().value);
let rateVal = Number(rate.value);
let expenseVal = Number(expense.value);
let goalVal = Number(goal.value);
let feeVal = Number(fee.value);

if(salary<=0 || rateVal<=0){
output.innerHTML="Enter valid salary and rate.";
return;
}

if(feeVal<0 || feeVal>100){
output.innerHTML="Fee must be between 0-100%.";
return;
}

let original = salary*rateVal;
let feeAmount = original*feeVal/100;
let final = original-feeAmount;
let netSavings = final-expenseVal;

if(netSavings<0){
output.innerHTML="⚠ Expense is higher than income!";
progress.style.width="0%";
return;
}

let progressPercent = goalVal>0 ? Math.min((netSavings/goalVal)*100,100):0;
let months = goalVal>0 ? Math.ceil(goalVal/netSavings):0;

output.innerHTML=
"<b>Receive:</b> "+final.toLocaleString()+" BDT<br><br>"+
"<b>Expense:</b> "+expenseVal.toLocaleString()+"<br><br>"+
"<b>Net Savings:</b> "+netSavings.toLocaleString()+"<br><br>"+
(goalVal>0 ? "<b>Goal Progress:</b> "+progressPercent.toFixed(1)+"%<br><b>Months:</b> "+months:"");

progress.style.width=progressPercent+"%";

saveHistory(final,netSavings);
let ctx = document.getElementById('financeChart').getContext('2d');

if (financeChart) {
    financeChart.destroy();
}

financeChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Receive', 'Expense', 'Net Savings'],
        datasets: [{
            data: [final, expenseVal, netSavings],
            backgroundColor: ['#00c853', '#d50000', '#2962ff']
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});
}
function saveHistory(final,net){
let historyData=JSON.parse(localStorage.getItem("history")||"[]");
historyData.unshift("Receive: "+final.toLocaleString()+" | Net: "+net.toLocaleString());
historyData=historyData.slice(0,5);
localStorage.setItem("history",JSON.stringify(historyData));
showHistory();
}

function showHistory(){
let historyData=JSON.parse(localStorage.getItem("history")||"[]");
history.innerHTML="<b>Last Calculations:</b><br>"+historyData.join("<br>");
}

function resetAll(){
document.querySelectorAll("input").forEach(i=>i.value="");
rate.value="30";
output.innerHTML="";
progress.style.width="0%";
}

function shareResult(){
if(navigator.share){
navigator.share({title:"Finance Result",text:output.innerText});
}
}

function toggleDarkMode(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")=="true"){
document.body.classList.add("dark");
}

function salaryInput(){ return document.getElementById("salary"); }

document.querySelectorAll("input").forEach(input=>{
input.addEventListener("input",calculate);
});

showHistory();

</script>
<script>
async function getLiveRate() {
  try {
    let response = await fetch("https://open.er-api.com/v6/latest/SAR");
    let data = await response.json();
    let bdtRate = data.rates.BDT;
    document.getElementById("rate").value = bdtRate.toFixed(2);
  } catch (error) {
    console.log("Rate fetch failed");
  }
}

window.onload = function(){
  getLiveRate();
};
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  installBtn.style.display = "none";
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === "accepted") {
    console.log("User installed the app");
  }
  deferredPrompt = null;
});

window.addEventListener("appinstalled", () => {
  console.log("App successfully installed");
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
