<!DOCTYPE html> 
<html>
<head>
<title>Saudi Salary Planner | SAR to BDT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Free SAR to BDT calculator with savings planner tool for Saudi workers. Convert Saudi Riyal to Bangladeshi Taka instantly.">
<meta name="keywords" content="SAR to BDT, Saudi Riyal to Taka, salary planner, savings calculator, expatriate finance tool">
<meta name="author" content="Rahul Hossain">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Saudi Salary Planner | SAR to BDT Calculator">
<meta property="og:description" content="Convert SAR to BDT and calculate yearly savings easily.">
<meta property="og:type" content="website">

<style>


body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f2f2;
}

header{
    background:#0a7c2f;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:500px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0a7c2f;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#055a20;
}

.result{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}
footer{
    text-align:center;
    padding:15px;
    font-size:14px;
    color:#777;
}
</style>
</head>

<body>

<header>
<h2>Saudi Salary Planner</h2>
<p>SAR to BDT + Savings Goal Tool</p>
</header>

<div class="container">

<label>Enter SAR Amount:</label>
<input type="number" id="sar" required> 

<label>Exchange Rate (1 SAR = ? BDT)</label>
<input type="number" id="rate" value="30" required>

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

</div>

<footer>
© 2026 Saudi Salary Planner | Made for Probashi Workers
</footer>

<script>
function calculate(){

var sar = document.getElementById("sar").value;
var rate = document.getElementById("rate").value;

if(sar=="" || rate==""){
    document.getElementById("output").innerHTML="Please enter all values";
    return;
}

var bdt = sar * rate;
var yearly = bdt * 12;

document.getElementById("output").innerHTML =
"SAR "+sar+" = "+bdt+" BDT <br><br> 1 Year Savings = "+yearly+" BDT";

}
</script>

</body>
</html>
